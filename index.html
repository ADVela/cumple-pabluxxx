
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <title>Happy Birthday 🌊</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Fredoka', sans-serif;
        }



        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: linear-gradient(180deg,#7bdff2,#b2f7ef,#80ed99);
            position: relative;
        }

            /* Fondo cuadriculado */
            body::before {
                content: "";
                position: absolute;
                width: 100%;
                height: 100%;
                background-image: linear-gradient(to right, rgba(0,0,0,0.06) 1px, transparent 1px), linear-gradient(to bottom, rgba(0,0,0,0.06) 1px, transparent 1px);
                background-size: 40px 40px;
                z-index: 0;
            }

        .container {
            position: relative;
            z-index: 2;
            text-align: center;
            animation: fadeIn 2s ease;
        }

        .title {
            font-size: 4rem;
            line-height: 1.2;
            margin-bottom: 20px;
            transform: rotate(-2deg);
        }

            /* Letras estilo recorte */
            .title span {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                width: 70px;
                height: 70px;
                margin: 4px;
                border-radius: 50%;
                box-shadow: 0 4px 10px rgba(0,0,0,0.15);
                animation: float 3s infinite ease-in-out;
            }

                .title span:nth-child(1) {
                    background: #ffb3c6;
                    color: #ff006e;
                }

                .title span:nth-child(2) {
                    background: #caffbf;
                    color: #2d6a4f;
                }

                .title span:nth-child(3) {
                    background: #ffd6a5;
                    color: #6d6875;
                }

                .title span:nth-child(4) {
                    background: #bde0fe;
                    color: #4361ee;
                }

                .title span:nth-child(5) {
                    background: #ffc6ff;
                    color: #9d4edd;
                }

                .title span:nth-child(6) {
                    background: #fdffb6;
                    color: #f77f00;
                }

                .title span:nth-child(7) {
                    background: #a0c4ff;
                    color: #3a0ca3;
                }

                .title span:nth-child(8) {
                    background: #ffcad4;
                    color: #d00000;
                }

                .title span:nth-child(9) {
                    background: #80ed99;
                    color: #1b4332;
                }

                .title span:nth-child(10) {
                    background: #72efdd;
                    color: #0c4a6e;
                }

                .title span:nth-child(11) {
                    background: #64dfdf;
                    color: #003049;
                }

                .title span:nth-child(12) {
                    background: #48cae4;
                    color: #03045e;
                }

                .title span:nth-child(13) {
                    background: #90e0ef;
                    color: #0077b6;
                }

                .title span:nth-child(14) {
                    background: #56cfe1;
                    color: #014f86;
                }

                .title span:nth-child(15) {
                    background: #80ffdb;
                    color: #2d6a4f;
                }

                .title span:nth-child(16) {
                    background: #a9def9;
                    color: #1d3557;
                }

        /* Pastel animado */
        .cake {
            position: relative;
            width: 220px;
            height: 220px;
            margin: auto;
            animation: bounce 2s infinite;
        }

        .plate {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 180px;
            height: 20px;
            background: white;
            border-radius: 50px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        .cake-base {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 90px;
            background: linear-gradient(180deg,#ffcad4,#ff8fab);
            border-radius: 20px;
            animation: buildCake 2s ease;
        }

        .icing {
            position: absolute;
            bottom: 95px;
            left: 50%;
            transform: translateX(-50%);
            width: 160px;
            height: 35px;
            background: #ffffff;
            border-radius: 20px;
            animation: fadeIn 3s ease;
        }

        .candle {
            position: absolute;
            width: 12px;
            height: 40px;
            background: #ffffff;
            border-radius: 10px;
            top: 40px;
            animation: fadeIn 4s ease;
        }

        .candle1 {
            left: 70px;
        }

        .candle2 {
            left: 104px;
        }

        .candle3 {
            left: 138px;
        }

        .flame {
            width: 14px;
            height: 14px;
            background: gold;
            border-radius: 50%;
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            animation: flicker 1s infinite;
            box-shadow: 0 0 15px gold;
        }

        @keyframes flicker {
            0%,100% {
                transform: translateX(-50%) scale(1);
            }

            50% {
                transform: translateX(-50%) scale(1.2);
            }
        }

        @keyframes growCake {
            0% {
                height: 0;
                opacity: 0;
            }

            100% {
                height: 90px;
                opacity: 1;
            }
        }

        @keyframes buildCake {
            0% {
                opacity: 0;
                transform: translateX(-50%) scale(0);
            }

            50% {
                transform: translateX(-50%) scale(1.1);
            }

            100% {
                opacity: 1;
                transform: translateX(-50%) scale(1);
            }
        }


        .message {
            margin-top: 20px;
            font-size: 1.5rem;
            color: #c9184a;
            background: rgba(255,255,255,0.6);
            display: inline-block;
            padding: 10px 20px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
        }
        /* Decoraciones hawaianas y gamer */
        .sticker {
            position: absolute;
            font-size: 3rem;
            animation: spin 10s linear infinite;
            z-index: 1;
        }

        .star1 {
            top: 10%;
            left: 10%;
        }

        .star2 {
            bottom: 15%;
            right: 10%;
        }

        .heart1 {
            top: 20%;
            right: 15%;
        }

        .heart2 {
            bottom: 20%;
            left: 15%;
        }

        @keyframes bounce {
            0%,100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-15px);
            }
        }

        @keyframes float {
            0%,100% {
                transform: translateY(0px) rotate(-3deg);
            }

            50% {
                transform: translateY(-8px) rotate(3deg);
            }
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Corazones flotando */
        .heart {
            position: absolute;
            color: #ff4d6d;
            font-size: 20px;
            animation: hearts 8s linear infinite;
            opacity: 0.7;
        }

        @keyframes hearts {
            0% {
                transform: translateY(100vh) scale(0);
            }

            100% {
                transform: translateY(-10vh) scale(1.5);
            }
        }

        #start-screen {
            position: fixed;
            inset: 0;
            background: linear-gradient(180deg,#7bdff2,#b2f7ef,#80ed99);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
            font-size: 2rem;
            color: black;
            cursor: pointer;
        }

        .start-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }


        .start-content img {
                width: 320px;
                border-radius: 20px;
                box-shadow: 0 8px 20px rgba(0,0,0,0.2);
         }


    </style>
</head>

<body>


    <div id="start-screen">
        <div class="start-content">
            <img src="cat.jpeg" alt="frog">
            <h1> ✨ Te tengo una sorpresa ✨</h1>
        </div>
    </div>

    <div class="container">

        <div class="title">
            <span>F</span>
            <span>E</span>
            <span>L</span>
            <span>I</span>
            <span>Z</span>
            <br>
            <span>C</span>
            <span>U</span>
            <span>M</span>
            <span>P</span>
            <span>L</span>
            <span>E</span>
            <span>A</span>
            <span>Ñ</span>
            <span>O</span>
            <span>S</span>
        </div>

        <div class="cake">
            <div class="plate"></div>
            <div class="cake-base"></div>
            <div class="icing"></div>

            <div class="candle candle1">
                <div class="flame"></div>
            </div>

            <div class="candle candle2">
                <div class="flame"></div>
            </div>

            <div class="candle candle3">
                <div class="flame"></div>
            </div>
        </div>

        <div class="message">
            ✨ Pabluxxx ✨
            Rana verde eres tu !!🐸💚
        </div>

    </div>

    <script>
        // Crear corazones flotantes
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            const emojis = [
                '🎉',
                '🎊',
                '💙',
                '💚',
                '🌊',
                '⭐',
                '🐸',
                '🌺',
                '🐟',
                '🐠',
                '🪼',
                '🛸',
                '👽',
                '✨'
            ];
            heart.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];

            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 3 + 5) + 's';
            heart.style.fontSize = (Math.random() * 20 + 15) + 'px';

            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 8000);
        }

        setInterval(createHeart, 300);
    </script>


    <audio id="bg-music" loop>
        <source src="the-days.mp3" type="audio/mpeg">
    </audio>

    <script>
        const startScreen = document.getElementById("start-screen");
        const music = document.getElementById("bg-music");

        startScreen.addEventListener("click", () => {
            music.play();
            startScreen.style.display = "none";
        });
    </script>

</body>
</html>
